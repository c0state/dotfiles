run-shell 'tmux setenv -g TMUX_PLATFORM $(uname)'

#----- set vi mode
set -g mode-keys vi

#----- set window notifications
setw -g monitor-activity off
set -g visual-activity off

set -as terminal-features ",xterm-256color*:RGB"
set -as terminal-features ",xterm-256color*:hyperlinks"
set -as terminal-features ",xterm-256color*:usstyle"
set -as terminal-features ",xterm-256color*:cstyle"
set -as terminal-features ",xterm-256color*:focus"
set -as terminal-features ",xterm*:extkeys"
set -s extended-keys on
set -s extended-keys-format csi-u
set -g set-clipboard on
set -g allow-passthrough on

set-option -g renumber-windows on

#----- don't try to rename window in status bar dynamically
set-window-option -g automatic-rename off

setw -g aggressive-resize on

#----- turn on mouse scroll
setw -g mouse on

#----- tmux plugin manager (tpack, TPM-compatible: https://github.com/tmuxpack/tpack)
# Full URLs, not "owner/repo" shorthand: tpack (like TPM before it) expands
# shorthand to "https://git::@github.com/owner/repo", a stale anonymous-auth
# workaround from 2014 that trips up git-credential-manager today.
# See https://github.com/tmux-plugins/tpm/issues/7 and
# https://github.com/tmuxpack/tpack/blob/main/internal/plug/resolve.go
set -g @plugin 'https://github.com/christoomey/vim-tmux-navigator'
set -g @plugin 'https://github.com/tmux-plugins/tmux-resurrect'
set -g @plugin 'https://github.com/tmux-plugins/tmux-continuum'
set -g @plugin 'https://github.com/tmux-plugins/tmux-sensible'
set -g @plugin 'https://github.com/tmux-plugins/tmux-pain-control'
set -g @plugin 'https://github.com/tmux-plugins/tmux-yank'
set -g @plugin 'https://github.com/dracula/tmux'

set -g @continuum-save-interval '5'
set -g @dracula-plugins "none"

run 'tpack init'
#----- tmux plugin manager end

#----- remap clear line and clear screen (must come after tpm so plugin bindings don't clobber these)
bind C-k send-keys 'C-k'
bind C-l send-keys 'C-l'

#----- set status bar
set -g status-bg black
set -g status-fg white
set -g status-left ''
set -g status-right "#(~/.tmux/plugins/tmux-continuum/scripts/continuum_save.sh)#{?window_bigger,[#{window_offset_x}#,#{window_offset_y}] ,}\"#{=21:pane_title}\""
set-window-option -g window-status-current-style bg=darkred

# needed for neovim restore if using appimage
# see https://github.com/tmux-plugins/tmux-resurrect/issues/394#issuecomment-1105698320
set -g @resurrect-processes '"~nvim->nvim *"'

#----- continuum tmux session state plugin
set -g @continuum-restore 'on'
